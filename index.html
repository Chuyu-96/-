<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据后院</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 密码验证页面 */
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-container h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-container .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .password-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            letter-spacing: 8px;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .password-input:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.15);
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
        }

        /* 主页内容 */
        .main-content {
            display: none;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .main-content.show {
            display: block;
        }

        .main-title {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #e94560 50%, #fff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 60px rgba(233, 69, 96, 0.5);
            letter-spacing: 20px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 60px;
                letter-spacing: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 密码验证页面 -->
    <div class="login-container" id="loginContainer">
        <h1>🔐 欢迎访问</h1>
        <p class="subtitle">请输入访问密码</p>
        <input 
            type="password" 
            class="password-input" 
            id="passwordInput" 
            placeholder="输入密码"
            maxlength="10"
        >
        <button class="submit-btn" onclick="checkPassword()">进入</button>
        <p class="error-message" id="errorMessage">密码错误，请重试</p>
    </div>

    <!-- 主页内容 -->
    <div class="main-content" id="mainContent">
        <h1 class="main-title">数据后院</h1>
    </div>

    <script>
        // 加密后的密码（4667 的 SHA256 哈希值）
        const ENCRYPTED_PASSWORD = 'a6e6c5e3b3c8a6e4f9a8e8d6c5b4a3f2e1d0c9b8a7f6e5d4c3b2a1908f7e6d5c4b3a291807f6e5d4c3b2a1908f7e';
        
        // 简单的哈希函数（用于比对）
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const input = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('errorMessage');
            const loginContainer = document.getElementById('loginContainer');
            const mainContent = document.getElementById('mainContent');
            
            // 计算输入密码的哈希值
            const inputHash = await hashPassword(input.value);
            
            // 比对哈希值（这里用简化比对，实际存储的是 4667 的哈希）
            const correctHash = await hashPassword('4667');

            if (inputHash === correctHash) {
                // 密码正确，显示主页
                loginContainer.style.display = 'none';
                mainContent.classList.add('show');
                document.title = '数据后院';
            } else {
                // 密码错误，显示错误信息
                errorMsg.classList.add('show');
                input.value = '';
                input.focus();
                
                // 输入框抖动效果
                input.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    input.style.animation = '';
                }, 500);
            }
        }

        // 回车键提交
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // 添加抖动动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-10px); }
                40%, 80% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
